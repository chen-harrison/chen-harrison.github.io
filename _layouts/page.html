---
layout: default
---
<article class="post">

  <header class="post-header">
    <h1 class="heading-top">{{ page.title | escape | upcase }}</h1>
    {%- if page.repo -%}
      <h3><a href="{{ page.repo }}">GitHub Repository Link</a></h3>
    {%- endif -%}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
